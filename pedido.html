<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fazer Pedido</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #8B2FC9;
      --purple-light: #A855F7;
      --pink: #E040FB;
      --bg: #0A0A0F;
      --bg2: #111118;
      --card: #1A1A26;
      --card-border: #2A2A3A;
      --text: #F0F0FF;
      --text-muted: #8888AA;
      --green: #22c55e;
      --pix: #32BCAD;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#f0eef8; font-family:'DM Sans',sans-serif; min-height:100vh; }

    /* LAYOUT PRINCIPAL */
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 16px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      align-items: start;
    }

    /* CARD BASE */
    .card {
      background: #1a1a26;
      border-radius: 16px;
      overflow: hidden;
    }

    /* ===================== LADO ESQUERDO ===================== */

    /* Cabeçalho do serviço */
    .service-header {
      background: #1a1a26;
      padding: 28px 28px 0;
      text-align: center;
    }
    .service-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
    }
    .service-header h2 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .service-name-badge {
      display: inline-block;
      background: rgba(168,85,247,.15); border: 1px solid rgba(168,85,247,.3);
      color: var(--purple-light); font-size: 12px; padding: 4px 12px; border-radius: 20px;
      margin-bottom: 20px;
    }

    /* Quantidade */
    .qty-section { padding: 20px 28px; background: #1a1a26; }
    .qty-label { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; text-align:center; }
    .qty-row {
      display: flex; align-items: center; justify-content: center; gap: 0;
      background: #13131e; border-radius: 12px; overflow: hidden;
      border: 1px solid var(--card-border);
    }
    .qty-btn {
      width: 56px; height: 56px; border: none; cursor: pointer;
      font-size: 22px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      transition: opacity .2s; flex-shrink: 0;
    }
    .qty-btn:hover { opacity: .8; }
    .qty-input {
      flex: 1; text-align: center; font-size: 24px; font-weight: 700;
      color: #fff; background: transparent; border: none; outline: none;
      font-family: 'Orbitron', sans-serif; padding: 0 8px;
    }
    .qty-limits { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 8px; }

    /* Requisitos */
    .req-section { margin: 0 28px 20px; border-radius: 10px; overflow: hidden; background: #13131e; border: 1px solid #2a2a3a; }
    .req-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; cursor: pointer; color: var(--purple-light); font-size: 13px; font-weight: 600;
    }
    .req-toggle span { display:flex; align-items:center; gap:8px; }
    .req-body { padding: 0 16px 12px; display: none; }
    .req-body.open { display: block; }
    .req-body li { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; list-style: none; padding-left: 12px; position: relative; }
    .req-body li::before { content: '•'; position: absolute; left: 0; color: var(--purple-light); }
    .req-body li b { color: #fff; }

    /* Link do perfil */
    .link-section { padding: 0 28px 20px; background: #1a1a26; }
    .link-section label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 8px; }
    .link-input-wrap { position: relative; }
    .link-input-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
    .link-input {
      width: 100%; background: #13131e; border: 1px solid var(--card-border);
      color: #fff; padding: 11px 14px 11px 38px; border-radius: 8px;
      font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color .2s;
    }
    .link-input:focus { border-color: var(--purple-light); }
    .link-input::placeholder { color: #555; }

    /* Email / Whats */
    .contact-section { padding: 0 28px 20px; background: #1a1a26; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .contact-section label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 6px; }
    .contact-input {
      width: 100%; background: #13131e; border: 1px solid var(--card-border);
      color: #fff; padding: 10px 14px; border-radius: 8px;
      font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color .2s;
    }
    .contact-input:focus { border-color: var(--purple-light); }
    .contact-input::placeholder { color: #555; }

    /* Pagamento */
    .pay-section { padding: 0 28px 20px; background: #1a1a26; }
    .pay-section label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 10px; }
    .pay-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .pay-opt {
      border: 2px solid var(--card-border); border-radius: 10px;
      padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px;
      transition: border-color .2s, background .2s; background: #13131e;
    }
    .pay-opt.selected { border-color: var(--pix); background: rgba(50,188,173,.08); }
    .pay-opt input { display: none; }
    .pay-opt-label { font-size: 14px; font-weight: 600; color: #fff; }
    .pay-opt-sub { font-size: 11px; color: var(--text-muted); }
    .pix-badge { background: var(--pix); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }

    /* Termos */
    .terms-section { padding: 0 28px 20px; background: #1a1a26; }
    .terms-check { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .terms-check input { width: 16px; height: 16px; accent-color: var(--purple-light); cursor: pointer; }
    .terms-check span { font-size: 12px; color: var(--text-muted); }
    .terms-check a { color: var(--purple-light); text-decoration: none; }

    /* Botão finalizar */
    .btn-finalizar {
      width: calc(100% - 56px); margin: 0 28px 28px;
      display: block; background: linear-gradient(135deg, var(--purple), var(--pink));
      color: #fff; border: none; border-radius: 12px;
      padding: 16px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: opacity .2s, transform .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-finalizar:hover { opacity: .9; transform: translateY(-1px); }

    /* ===================== UPSELL ===================== */
    .upsell-card {
      background: #1a1a26; border-radius: 16px;
      border: 1px solid #2a1a3e; margin-top: 16px; overflow: hidden;
    }
    .upsell-header {
      background: linear-gradient(135deg, #1a0a2e, #2a1040);
      padding: 14px 20px; display: flex; align-items: center; gap: 10px;
    }
    .upsell-header h3 { font-size: 14px; font-weight: 700; color: #fff; }
    .upsell-header p { font-size: 12px; color: var(--text-muted); }
    .fire-icon { font-size: 20px; }

    .upsell-item {
      padding: 14px 20px; border-bottom: 1px solid #1e1e2e;
      display: flex; align-items: center; gap: 12px;
    }
    .upsell-item:last-child { border-bottom: none; }
    .upsell-ig-icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
      display: flex; align-items: center; justify-content: center;
    }
    .upsell-info { flex: 1; min-width: 0; }
    .upsell-name { font-size: 13px; font-weight: 600; color: #fff; }
    .upsell-qty { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .upsell-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; margin-bottom: 4px; display: inline-block;
    }
    .badge-upgrade { background: rgba(168,85,247,.2); color: var(--purple-light); border: 1px solid rgba(168,85,247,.3); }
    .badge-popular { background: rgba(239,68,68,.2); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
    .badge-economy { background: rgba(34,197,94,.2); color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
    .upsell-price-col { text-align: right; flex-shrink: 0; }
    .upsell-old-price { font-size: 11px; color: var(--text-muted); text-decoration: line-through; }
    .upsell-new-price { font-size: 15px; font-weight: 700; color: var(--green); font-family: 'Orbitron', sans-serif; }
    .upsell-add-btn {
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      color: #fff; border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif;
      transition: opacity .2s;
    }
    .upsell-add-btn:hover { opacity: .8; }
    .upsell-add-btn.added { background: var(--green); }

    /* ===================== LADO DIREITO (RESUMO) ===================== */
    .summary-card { background: #1a1a26; border-radius: 16px; overflow: hidden; position: sticky; top: 20px; }
    .summary-header {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
    }
    .summary-header h3 { font-size: 15px; font-weight: 700; color: #fff; }
    .secure-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,.8); }

    .summary-item {
      padding: 16px 20px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid #1e1e2e;
    }
    .summary-ig-icon {
      width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
      background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
      display: flex; align-items: center; justify-content: center;
    }
    .summary-item-info { flex: 1; min-width: 0; }
    .summary-item-name { font-size: 13px; font-weight: 600; color: #fff; }
    .summary-item-plat { font-size: 11px; color: var(--text-muted); }
    .summary-item-price { text-align: right; }
    .summary-item-price .new { font-size: 14px; font-weight: 700; color: #fff; }
    .summary-item-price .old { font-size: 11px; color: var(--text-muted); text-decoration: line-through; }

    .summary-totals { padding: 16px 20px; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 13px; color: var(--text-muted); }
    .summary-row.total { color: #fff; font-size: 16px; font-weight: 700; margin-top: 12px; padding-top: 12px; border-top: 1px solid #2a2a3a; }
    .discount-row { color: var(--green); }
    .pix-tag { background: var(--pix); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }

    /* LOADING */
    .loading { display:flex; flex-direction:column; align-items:center; padding:40px; gap:12px; color:var(--text-muted); }
    .spinner { width:32px; height:32px; border:3px solid #2a2a3a; border-top-color:var(--purple-light); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* MOBILE */
    @media (max-width: 700px) {
      .page { grid-template-columns: 1fr; padding: 16px 12px; }
      .contact-section { grid-template-columns: 1fr; }
      .summary-card { position: static; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- ========== COLUNA ESQUERDA ========== -->
  <div>
    <!-- Card principal do serviço -->
    <div class="card" id="main-card">
      <div class="loading"><div class="spinner"></div><span>Carregando serviço...</span></div>
    </div>

    <!-- Upsell -->
    <div class="upsell-card" id="upsell-card" style="display:none;">
      <div class="upsell-header">
        <span class="fire-icon">🔥</span>
        <div>
          <h3>Complete seu pedido</h3>
          <p>Clientes que compraram isso também levaram:</p>
        </div>
      </div>
      <div id="upsell-items"></div>
    </div>
  </div>

  <!-- ========== COLUNA DIREITA (RESUMO) ========== -->
  <div class="summary-card" id="summary-card">
    <div class="summary-header">
      <h3>Seu Pedido</h3>
      <span class="secure-badge">🔒 Compra segura</span>
    </div>
    <div id="summary-body">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<script>
  // Pega parâmetros da URL: ?id=4973&name=...&rate=0.42&min=10&max=250000
  const params = new URLSearchParams(location.search);
  const serviceId   = params.get('id') || '';
  const serviceName = params.get('name') || 'Serviço Instagram';
  const serviceRate = parseFloat(params.get('rate')) || 0.50;
  const serviceMin  = parseInt(params.get('min'))  || 10;
  const serviceMax  = parseInt(params.get('max'))  || 100000;

  const PIX_DISCOUNT = 0.05; // 5%
  const UPSELL_FAKE_DISCOUNT = 0.30; // 30% de "desconto" visual no upsell

  let qty = Math.max(serviceMin, 100);
  let payMethod = 'pix';
  let upsellAdded = {};
  let upsellServicos = [];

  // ─── Calcula preço ───────────────────────────────
  function calcPreco(rate, quantidade) {
    return (rate / 1000) * quantidade;
  }

  function fmt(val) {
    return val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  // ─── Renderiza card principal ─────────────────────
  function renderMain() {
    const preco = calcPreco(serviceRate, qty);
    const precoComDesconto = payMethod === 'pix' ? preco * (1 - PIX_DISCOUNT) : preco;

    document.getElementById('main-card').innerHTML = `
      <div class="service-header">
        <div class="service-icon">
          <svg viewBox="0 0 24 24" fill="white" width="24" height="24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
        </div>
        <h2>Precisa de quantos?</h2>
        <div class="service-name-badge">${serviceName}</div>
      </div>

      <div class="qty-section">
        <div class="qty-label">Mais quantidade = maior desconto</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-100)">−</button>
          <input class="qty-input" type="number" id="qtyInput" value="${qty}"
            min="${serviceMin}" max="${serviceMax}"
            onchange="setQty(parseInt(this.value))"
            oninput="setQty(parseInt(this.value))">
          <button class="qty-btn" onclick="changeQty(+100)">+</button>
        </div>
        <div class="qty-limits">Mínimo: ${serviceMin.toLocaleString('pt-BR')} — Máximo: ${serviceMax.toLocaleString('pt-BR')}</div>
      </div>

      <div class="req-section">
        <div class="req-toggle" onclick="toggleReq(this)">
          <span>📋 Requisitos para receber o serviço</span>
          <span id="req-arrow">▲</span>
        </div>
        <ul class="req-body open" id="req-body">
          <li>Perfil precisa estar <b>público</b>. Se estiver privado, os serviços não chegam.</li>
          <li>Reposição, quando disponível, segue as regras do serviço contratado e análise do suporte.</li>
        </ul>
      </div>

      <div class="link-section">
        <label>Link do perfil do Instagram</label>
        <div class="link-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
          <input class="link-input" type="url" id="profileLink" placeholder="https://instagram.com/seuperfil">
        </div>
      </div>

      <div class="contact-section">
        <div>
          <label>E-mail</label>
          <input class="contact-input" type="email" id="emailInput" placeholder="seuemail@gmail.com">
        </div>
        <div>
          <label>WhatsApp</label>
          <input class="contact-input" type="tel" id="whatsInput" placeholder="(00) 00000-0000">
        </div>
      </div>

      <div class="pay-section">
        <label>Método de pagamento</label>
        <div class="pay-options">
          <div class="pay-opt selected" id="opt-pix" onclick="selectPay('pix')">
            <span class="pix-badge">PIX</span>
            <div>
              <div class="pay-opt-label">Pix</div>
              <div class="pay-opt-sub">5% de desconto</div>
            </div>
          </div>
          <div class="pay-opt" id="opt-card" onclick="selectPay('card')">
            <span style="font-size:20px">💳</span>
            <div>
              <div class="pay-opt-label">Cartão de Crédito</div>
              <div class="pay-opt-sub">Sem desconto</div>
            </div>
          </div>
        </div>
        ${payMethod === 'pix' ? `<p style="font-size:11px;color:var(--text-muted);margin-top:10px;">Compra única via PIX, sem assinatura recorrente. O valor total é exibido no resumo.</p>` : ''}
      </div>

      <div class="terms-section">
        <label class="terms-check">
          <input type="checkbox" id="termsCheck">
          <span>Aceito os <a href="#">Termos de Uso</a> e <a href="#">Política de Reembolso</a></span>
        </label>
      </div>

      <button class="btn-finalizar" onclick="finalizar()">
        🔒 ${payMethod === 'pix' ? 'Gerar Pix QR Code' : 'Finalizar Pedido'}
      </button>
    `;
  }

  // ─── Resumo lateral ──────────────────────────────
  function renderSummary() {
    const preco     = calcPreco(serviceRate, qty);
    const desconto  = payMethod === 'pix' ? preco * PIX_DISCOUNT : 0;
    const total     = preco - desconto;

    // Extras do upsell adicionados
    let extrasHTML = '';
    let extrasTotal = 0;
    for (const [id, s] of Object.entries(upsellAdded)) {
      const p = calcPreco(s.rate, s.qty);
      extrasTotal += p;
      extrasHTML += `
        <div class="summary-item">
          <div class="summary-ig-icon">
            <svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
          </div>
          <div class="summary-item-info">
            <div class="summary-item-name">${s.name}</div>
            <div class="summary-item-plat">Instagram • ${s.qty.toLocaleString('pt-BR')} unid.</div>
          </div>
          <div class="summary-item-price">
            <div class="new">${fmt(p)}</div>
          </div>
        </div>`;
    }

    const grandTotal = total + extrasTotal;

    document.getElementById('summary-body').innerHTML = `
      <div class="summary-item">
        <div class="summary-ig-icon">
          <svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
        </div>
        <div class="summary-item-info">
          <div class="summary-item-name">${qty.toLocaleString('pt-BR')} ${serviceName}</div>
          <div class="summary-item-plat">Instagram</div>
        </div>
        <div class="summary-item-price">
          <div class="new">${fmt(preco)}</div>
        </div>
      </div>
      ${extrasHTML}
      <div class="summary-totals">
        <div class="summary-row"><span>Subtotal</span><span>${fmt(preco + extrasTotal)}</span></div>
        ${payMethod === 'pix' ? `<div class="summary-row discount-row"><span><span class="pix-tag">PIX</span> 5% de desconto</span><span>−${fmt(desconto)}</span></div>` : ''}
        <div class="summary-row total"><span>Total</span><span>${fmt(grandTotal)}</span></div>
      </div>`;
  }

  // ─── Upsell ──────────────────────────────────────
  async function carregarUpsell() {
    try {
      const res = await fetch('/api/services');
      const data = await res.json();
      if (!Array.isArray(data)) return;

      // Pega 3 serviços Instagram diferentes do atual
      const outros = data.filter(s =>
        s.name && s.name.toLowerCase().includes('instagram') && String(s.service) !== serviceId
      );
      // Embaralha e pega 3
      upsellServicos = outros.sort(() => Math.random() - 0.5).slice(0, 3);
      renderUpsell();
    } catch {}
  }

  const BADGES = [
    { label: '⬆️ Upgrade', cls: 'badge-upgrade' },
    { label: '🔥 Mais Popular', cls: 'badge-popular' },
    { label: '💰 Economia', cls: 'badge-economy' },
  ];

  function renderUpsell() {
    if (!upsellServicos.length) return;
    document.getElementById('upsell-card').style.display = 'block';

    document.getElementById('upsell-items').innerHTML = upsellServicos.map((s, i) => {
      const qtyDefault = Math.max(parseInt(s.min) || 100, 100);
      const precoReal  = calcPreco(parseFloat(s.rate), qtyDefault);
      const precoFake  = precoReal / (1 - UPSELL_FAKE_DISCOUNT); // preço "sem desconto" fake
      const badge = BADGES[i] || BADGES[0];
      const isAdded = !!upsellAdded[s.service];

      return `
        <div class="upsell-item">
          <div class="upsell-ig-icon">
            <svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
          </div>
          <div class="upsell-info">
            <div><span class="upsell-badge ${badge.cls}">${badge.label}</span></div>
            <div class="upsell-name">${s.name}</div>
            <div class="upsell-qty">${qtyDefault.toLocaleString('pt-BR')} unidades</div>
          </div>
          <div class="upsell-price-col" style="margin-right:10px;">
            <div class="upsell-old-price">${fmt(precoFake)}</div>
            <div class="upsell-new-price">${fmt(precoReal)}</div>
          </div>
          <button class="upsell-add-btn ${isAdded ? 'added' : ''}" id="ubtn-${s.service}"
            onclick="toggleUpsell('${s.service}', '${s.name.replace(/'/g,"\\'")}', ${parseFloat(s.rate)}, ${qtyDefault})">
            ${isAdded ? '✓ Adicionado' : '+ Adicionar'}
          </button>
        </div>`;
    }).join('');
  }

  function toggleUpsell(id, name, rate, qtyU) {
    if (upsellAdded[id]) {
      delete upsellAdded[id];
    } else {
      upsellAdded[id] = { name, rate, qty: qtyU };
    }
    renderUpsell();
    renderSummary();
  }

  // ─── Interações ──────────────────────────────────
  function changeQty(delta) {
    setQty(qty + delta);
  }

  function setQty(val) {
    if (isNaN(val)) return;
    qty = Math.min(serviceMax, Math.max(serviceMin, val));
    document.getElementById('qtyInput').value = qty;
    renderSummary();
  }

  function selectPay(method) {
    payMethod = method;
    document.getElementById('opt-pix').classList.toggle('selected', method === 'pix');
    document.getElementById('opt-card').classList.toggle('selected', method === 'card');
    renderMain();
    renderSummary();
  }

  function toggleReq(el) {
    const body = document.getElementById('req-body');
    body.classList.toggle('open');
    document.getElementById('req-arrow').textContent = body.classList.contains('open') ? '▲' : '▼';
  }

  function finalizar() {
    const link = document.getElementById('profileLink')?.value.trim();
    const email = document.getElementById('emailInput')?.value.trim();
    const terms = document.getElementById('termsCheck')?.checked;

    if (!link) { alert('Informe o link do seu perfil do Instagram!'); return; }
    if (!email) { alert('Informe seu e-mail!'); return; }
    if (!terms) { alert('Aceite os Termos de Uso para continuar.'); return; }

    alert('Em breve: integração com Mercado Pago para gerar o QR Code Pix! 🚀');
  }

  // ─── Init ─────────────────────────────────────────
  renderMain();
  renderSummary();
  carregarUpsell();
</script>

</body>
</html>
