<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serviços - X (Twitter)</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #8B2FC9;
      --purple-light: #A855F7;
      --bg: #0A0A0F;
      --bg2: #111118;
      --card: #1A1A26;
      --card-border: #2A2A3A;
      --text: #F0F0FF;
      --text-muted: #8888AA;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* NAVBAR */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      background: rgba(10,10,15,0.95);
      border-bottom: 1px solid var(--card-border);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(10px);
    }
    .nav-back { display:flex; align-items:center; gap:8px; color:var(--purple-light); text-decoration:none; font-size:14px; font-weight:600; transition:opacity .2s; }
    .nav-back:hover { opacity:.7; }
    .nav-title { display:flex; align-items:center; gap:10px; font-family:'Orbitron',sans-serif; font-size:16px; font-weight:700; }
    .plat-icon-nav {
      width:32px; height:32px; border-radius:8px;
      background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
      display:flex; align-items:center; justify-content:center;
    }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #0A0A0F 0%, #1a0a2e 50%, #0A0A0F 100%);
      padding: 36px 32px 28px; text-align:center;
      border-bottom: 1px solid var(--card-border);
    }
    .hero-badge {
      display:inline-block; background:rgba(139,47,201,.15);
      border:1px solid rgba(168,85,247,.3); color:var(--purple-light);
      font-size:12px; font-family:'Orbitron',sans-serif; letter-spacing:2px;
      padding:6px 16px; border-radius:20px; margin-bottom:14px;
    }
    .hero h1 { font-family:'Orbitron',sans-serif; font-size:26px; font-weight:800; margin-bottom:8px; }
    .hero h1 em { font-style:normal; background:linear-gradient(135deg,var(--purple-light),#E040FB); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .hero p { color:var(--text-muted); font-size:14px; max-width:500px; margin:0 auto; }

    /* VIEW CATEGORIAS */
    .container-narrow { max-width: 560px; margin: 0 auto; padding: 32px 20px; }
    .choose-label { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }

    .cat-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 18px 20px;
      cursor: pointer; margin-bottom: 10px;
      transition: border-color .2s, background .2s;
    }
    .cat-item:hover { border-color: var(--purple); background: #1f1f30; }

    .cat-item-left { display:flex; align-items:center; gap:12px; }
    .cat-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .cat-item-title { font-size:15px; font-weight:600; color:var(--text); }
    .cat-item-desc { font-size:12px; color:var(--text-muted); margin-top:2px; }
    .cat-arrow { color: var(--purple-light); font-size:18px; }

    /* VIEW SERVIÇOS */
    .filter-bar {
      display:flex; align-items:center; gap:12px;
      padding:14px 24px; background:var(--bg2);
      border-bottom:1px solid var(--card-border);
      position:sticky; top:61px; z-index:90; flex-wrap:wrap;
    }
    .back-cat-btn {
      background: none; border: 1px solid var(--card-border);
      color: var(--purple-light); padding: 8px 14px; border-radius:8px;
      font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
      font-family:'DM Sans',sans-serif; transition: border-color .2s;
    }
    .back-cat-btn:hover { border-color: var(--purple-light); }
    .search-input {
      flex:1; min-width:180px; background:var(--card);
      border:1px solid var(--card-border); color:var(--text);
      padding:9px 14px; border-radius:8px; font-size:14px;
      font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s;
    }
    .search-input:focus { border-color:var(--purple-light); }
    .search-input::placeholder { color:var(--text-muted); }
    .results-count { color:var(--text-muted); font-size:13px; white-space:nowrap; }

    .container { max-width:1200px; margin:0 auto; padding:24px 20px; }

    /* LOADING / ERRO */
    .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:16px; color:var(--text-muted); }
    .spinner { width:40px; height:40px; border:3px solid var(--card-border); border-top-color:var(--purple-light); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-box { background:rgba(220,38,38,.1); border:1px solid rgba(220,38,38,.3); color:#FCA5A5; padding:20px 24px; border-radius:12px; text-align:center; margin:40px auto; max-width:500px; }

    /* TABELA */
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .table-wrapper { background:#0e0e16; border:1px solid var(--card-border); border-radius:14px; overflow:hidden; animation:fadeIn .25s ease; }
    .services-table { width:100%; border-collapse:collapse; }
    .services-table thead tr { background:var(--card); border-bottom:2px solid var(--card-border); }
    .services-table thead th { padding:12px 16px; font-size:11px; font-family:'Orbitron',sans-serif; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.5px; text-align:left; white-space:nowrap; }
    .services-table thead th.right { text-align:right; }
    .services-table thead th.center { text-align:center; }
    .services-table tbody tr { border-bottom:1px solid #1e1e2e; transition:background .15s; }
    .services-table tbody tr:hover { background:rgba(139,47,201,.06); }
    .services-table tbody td { padding:13px 16px; font-size:13px; vertical-align:middle; }

    .td-id { font-family:'Orbitron',sans-serif; font-size:11px; color:var(--purple-light); white-space:nowrap; width:70px; }
    .td-name { color:var(--text); font-weight:500; line-height:1.4; }
    .td-price { text-align:right; white-space:nowrap; width:130px; }
    .price-value { font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700; background:linear-gradient(135deg,var(--purple-light),#E040FB); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .price-unit { font-size:11px; color:var(--text-muted); margin-left:2px; }
    .td-qty { text-align:right; white-space:nowrap; color:var(--text-muted); font-size:12px; width:180px; }
    .td-refill { text-align:center; width:70px; }
    .badge-refill { display:inline-block; background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.3); color:#4ade80; font-size:11px; font-weight:600; padding:3px 8px; border-radius:20px; }
    .badge-no-refill { display:inline-block; color:#555; font-size:13px; }
    .td-btn { text-align:right; width:100px; }
    .service-btn { background:linear-gradient(135deg,var(--purple),var(--purple-light)); color:white; border:none; padding:7px 14px; border-radius:7px; font-size:12px; font-weight:600; cursor:pointer; transition:opacity .2s,transform .15s; font-family:'DM Sans',sans-serif; white-space:nowrap; }
    .service-btn:hover { opacity:.85; transform:scale(1.03); }
    .no-results { text-align:center; color:var(--text-muted); padding:60px 20px; }

    @media (max-width:700px) {
      nav { padding:12px 16px; }
      .hero { padding:28px 16px 20px; }
      .hero h1 { font-size:20px; }
      .filter-bar { padding:12px 14px; top:57px; }
      .container { padding:16px 10px; }
      .services-table thead th.hide-mobile,
      .services-table tbody td.hide-mobile { display:none; }
      .services-table tbody td { padding:12px 10px; }
      .td-name { font-size:12px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-back">← Voltar</a>
    <div class="nav-title">
      <div class="plat-icon-nav"><svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.258 5.63 5.906-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div>
      Serviços Instagram
    </div>
    <div style="width:80px;"></div>
  </nav>

  <div class="hero">
    <div class="hero-badge">✦ X (Twitter)</div>
    <h1>Serviços <em>X (Twitter)</em></h1>
    <p>Aumente seguidores, curtidas e retweets no X (Twitter).</p>
  </div>

  <!-- VIEW 1: Menu de categorias -->
  <div id="view-categorias" class="container-narrow">
    <p class="choose-label">Escolha qual tipo de serviço você deseja adquirir.</p>
    <div id="cat-menu">
      <div class="loading"><div class="spinner"></div><span>Carregando...</span></div>
    </div>
  </div>

  <!-- VIEW 2: Lista de serviços -->
  <div id="view-servicos" style="display:none;">
    <div class="filter-bar">
      <button class="back-cat-btn" onclick="voltarCategorias()">← Categorias</button>
      <input type="text" class="search-input" id="searchInput" placeholder="🔍  Buscar serviço ou ID..." oninput="filtrarServicos()">
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="container">
      <div id="content"></div>
    </div>
  </div>

  <script>
    let todosServicos = [];
    let servicosCatAtual = [];

    const CATEGORIAS = [
      { label: 'Seguidores', emoji: '👥', desc: 'Seguidores para seu perfil.', color: '#3b82f6', test: s => /follower|seguidor/i.test(s) },
      { label: 'Curtidas', emoji: '❤️', desc: 'Curtidas nos seus tweets.', color: '#f43f5e', test: s => /like|curtida/i.test(s) },
      { label: 'Retweets', emoji: '🔄', desc: 'Retweets nas suas publicações.', color: '#22c55e', test: s => /retweet|rt/i.test(s) },
      { label: 'Visualizações', emoji: '👁️', desc: 'Views nos seus tweets.', color: '#a855f7', test: s => /view|visuali|impression/i.test(s) },
      { label: 'Comentários', emoji: '💬', desc: 'Respostas nos seus tweets.', color: '#06b6d4', test: s => /comment|reply|comentário/i.test(s) },
      { label: 'Outros', emoji: '📦', desc: 'Outros serviços disponíveis.', color: '#6b7280', test: s => true },
    ];

    function detectarCategoria(nome) {
      for (const cat of CATEGORIAS) {
        if (cat.test(nome)) return cat.label;
      }
      return 'Outros';
    }

    async function carregarServicos() {
      try {
        const res = await fetch('/api/services');
        if (!res.ok) throw new Error();
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error();

        todosServicos = data.filter(s => s.name && /twitter|twit| tw |x /i.test(s.name));
        if (todosServicos.length === 0) todosServicos = data;

        renderCategorias();
      } catch {
        document.getElementById('cat-menu').innerHTML =
          `<div class="error-box"><strong>Não foi possível carregar os serviços.</strong></div>`;
      }
    }

    function renderCategorias() {
      // Descobre quais categorias têm serviços
      const grupos = {};
      for (const s of todosServicos) {
        const cat = detectarCategoria(s.name);
        if (!grupos[cat]) grupos[cat] = [];
        grupos[cat].push(s);
      }

      const html = CATEGORIAS
        .filter(c => grupos[c.label])
        .map(c => `
          <div class="cat-item" onclick="abrirCategoria('${c.label.replace(/'/g,"\\'")}')">
            <div class="cat-item-left">
              <span class="cat-dot" style="background:${c.color}"></span>
              <div>
                <div class="cat-item-title">${c.emoji} ${c.label}</div>
                <div class="cat-item-desc">${c.desc} <span style="color:var(--purple-light)">(${grupos[c.label].length})</span></div>
              </div>
            </div>
            <span class="cat-arrow">→</span>
          </div>`)
        .join('');

      document.getElementById('cat-menu').innerHTML = html;
    }

    function abrirCategoria(label) {
      const grupos = {};
      for (const s of todosServicos) {
        const cat = detectarCategoria(s.name);
        if (!grupos[cat]) grupos[cat] = [];
        grupos[cat].push(s);
      }
      servicosCatAtual = grupos[label] || [];
      document.getElementById('searchInput').value = '';
      document.getElementById('view-categorias').style.display = 'none';
      document.getElementById('view-servicos').style.display = 'block';
      renderServicos(servicosCatAtual);
    }

    function voltarCategorias() {
      document.getElementById('view-servicos').style.display = 'none';
      document.getElementById('view-categorias').style.display = 'block';
    }

    function renderServicos(lista) {
      document.getElementById('resultsCount').textContent =
        `${lista.length} serviço${lista.length !== 1 ? 's' : ''} encontrado${lista.length !== 1 ? 's' : ''}`;

      if (lista.length === 0) {
        document.getElementById('content').innerHTML = `<div class="no-results">Nenhum serviço encontrado.</div>`;
        return;
      }

      const rows = lista.map(s => {
        const hasRefill = s.refill == 1 || s.refill === true || s.refill === 'true';
        const refillBadge = hasRefill
          ? `<span class="badge-refill">✓ Sim</span>`
          : `<span class="badge-no-refill">—</span>`;
        return `
          <tr>
            <td class="td-id">#${s.service}</td>
            <td class="td-name">${s.name}</td>
            <td class="td-price">
              <span class="price-value">R$ ${parseFloat(s.rate).toFixed(2)}</span>
              <span class="price-unit">/1000</span>
            </td>
            <td class="td-qty hide-mobile">${Number(s.min).toLocaleString('pt-BR')} — ${Number(s.max).toLocaleString('pt-BR')}</td>
            <td class="td-refill hide-mobile">${refillBadge}</td>
            <td class="td-btn">
              <button class="service-btn" onclick="location.href='pedido.html?id=${s.service}&name=${encodeURIComponent(s.name)}&rate=${s.rate}&min=${s.min}&max=${s.max}&platform=x'">Pedir →</button>
            </td>
          </tr>`;
      }).join('');

      document.getElementById('content').innerHTML = `
        <div class="table-wrapper">
          <table class="services-table">
            <thead>
              <tr>
                <th>ID</th><th>Nome</th>
                <th class="right">Preço</th>
                <th class="right hide-mobile">Mín — Máx</th>
                <th class="center hide-mobile">Refill</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function filtrarServicos() {
      const busca = document.getElementById('searchInput').value.toLowerCase();
      const filtrado = servicosCatAtual.filter(s =>
        s.name.toLowerCase().includes(busca) || String(s.service).includes(busca)
      );
      renderServicos(filtrado);
    }

    function pedido(id, nome) {
      alert(`Serviço selecionado: ${nome}\n\nEm breve você poderá fazer pedidos diretamente aqui!`);
    }

    carregarServicos();
  </script>

</body>
</html>
